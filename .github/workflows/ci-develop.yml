name: CI — Develop Branch

on:
  push:
    branches:
      - 'develop/phase*'
  pull_request:
    branches:
      - 'develop/phase*'

jobs:
  # ────────────────────────────────────────────
  #  TESTS D'INTÉGRATION
  # ────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       erp_test
          POSTGRES_USER:     erp
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U erp -d erp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, redis, zip, gd, bcmath

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend

      - name: Copy .env.testing
        run: cp .env.example .env.testing
        working-directory: backend

      - name: Generate app key
        run: php artisan key:generate --env=testing
        working-directory: backend

      - name: Run migrations
        run: php artisan migrate --env=testing --force
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: erp_test
          DB_USERNAME: erp
          DB_PASSWORD: secret

      - name: Run integration tests
        run: |
          php artisan test \
            --testsuite=Integration \
            --parallel \
            --log-junit=junit-integration.xml
        working-directory: backend
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: erp_test
          DB_USERNAME: erp
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
          REDIS_PASSWORD: null
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Tests
          path: backend/junit-integration.xml
          reporter: java-junit

  # ────────────────────────────────────────────
  #  TESTS MODULAIRES
  # ────────────────────────────────────────────
  modular:
    name: Modular Tests
    runs-on: ubuntu-latest
    needs: integration
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       erp_test
          POSTGRES_USER:     erp
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U erp -d erp_test"
          --health-interval 10s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, redis, zip, gd, bcmath

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend

      - name: Run migrations
        run: php artisan migrate --env=testing --force
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: erp_test
          DB_USERNAME: erp
          DB_PASSWORD: secret

      - name: Run modular tests
        run: |
          php artisan test \
            --testsuite=Modular \
            --log-junit=junit-modular.xml
        working-directory: backend
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: erp_test
          DB_USERNAME: erp
          DB_PASSWORD: secret
          QUEUE_CONNECTION: sync

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Modular Tests
          path: backend/junit-modular.xml
          reporter: java-junit

  # ────────────────────────────────────────────
  #  BUILD FRONTEND
  # ────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost/api
          VITE_APP_ENV: staging

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  # ────────────────────────────────────────────
  #  AUTO-TAG ALPHA
  # ────────────────────────────────────────────
  tag-alpha:
    name: Auto-tag Alpha
    runs-on: ubuntu-latest
    needs: [integration, modular, build-frontend]
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract phase number
        id: phase
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          PHASE=$(echo "$BRANCH" | grep -oP 'phase\K[0-9]+')
          echo "phase=$PHASE" >> "$GITHUB_OUTPUT"

      - name: Compute next alpha tag
        id: nexttag
        run: |
          PHASE="${{ steps.phase.outputs.phase }}"
          EXISTING=$(git tag -l "v${PHASE}.0.0-alpha.*" | sort -V | tail -1)
          if [ -z "$EXISTING" ]; then
            NEXT="v${PHASE}.0.0-alpha.1"
          else
            NUM=$(echo "$EXISTING" | grep -oP 'alpha\.\K[0-9]+')
            NEXT="v${PHASE}.0.0-alpha.$((NUM + 1))"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next alpha tag: $NEXT"

      - name: Create and push alpha tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.nexttag.outputs.tag }}" \
            -m "Auto-tagged by CI after tests passed on ${{ github.ref_name }}"
          git push origin "${{ steps.nexttag.outputs.tag }}"
