name: CI — Feature Branch

on:
  push:
    branches:
      - 'phase*/feature/**'
      - 'phase*/fix/**'
  pull_request:
    branches:
      - 'develop/phase*'

concurrency:
  group: ci-feature-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────
  #  QUALITÉ DU CODE
  # ────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, redis, zip, gd, bcmath
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend

      - name: Laravel Pint — Code style
        run: ./vendor/bin/pint --test
        working-directory: backend

      - name: PHPStan — Static analysis (level 6)
        run: ./vendor/bin/phpstan analyse --level=6 --no-progress --error-format=github
        working-directory: backend

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: TypeScript check
        run: npm run type-check
        working-directory: frontend

  # ────────────────────────────────────────────
  #  TESTS UNITAIRES BACKEND
  # ────────────────────────────────────────────
  unit-backend:
    name: Unit Tests — Backend
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, redis, zip, gd, bcmath
          coverage: xdebug

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend

      - name: Copy .env.testing
        run: cp .env.example .env.testing
        working-directory: backend

      - name: Generate app key
        run: php artisan key:generate --env=testing
        working-directory: backend

      - name: Run Unit tests with coverage
        run: |
          php artisan test \
            --testsuite=Unit \
            --parallel \
            --coverage-clover=coverage-unit.xml \
            --log-junit=junit-unit.xml
        working-directory: backend
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          REDIS_CLIENT: array
          QUEUE_CONNECTION: sync

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage-unit.xml
          flags: unit-backend
          name: unit-backend
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests Backend
          path: backend/junit-unit.xml
          reporter: java-junit

  # ────────────────────────────────────────────
  #  TESTS UNITAIRES FRONTEND
  # ────────────────────────────────────────────
  unit-frontend:
    name: Unit Tests — Frontend
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run unit tests with coverage
        run: npm run coverage -- --reporter=junit --outputFile=junit-frontend.xml
        working-directory: frontend

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          flags: unit-frontend
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests Frontend
          path: frontend/junit-frontend.xml
          reporter: java-junit
