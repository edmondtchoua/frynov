name: Hotfix

on:
  push:
    branches:
      - 'hotfix/**'

jobs:
  test-hotfix:
    name: Full Tests on Hotfix
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       erp_test
          POSTGRES_USER:     erp
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: --health-cmd "pg_isready -U erp" --health-interval 10s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, redis, zip, gd, bcmath

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend

      - name: Run migrations
        run: php artisan migrate --env=testing --force
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: erp_test
          DB_USERNAME: erp
          DB_PASSWORD: secret

      - name: Run ALL tests (hotfix doit tout faire passer)
        run: php artisan test --parallel
        working-directory: backend
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: erp_test
          DB_USERNAME: erp
          DB_PASSWORD: secret
          QUEUE_CONNECTION: sync

  tag-patch:
    name: Auto-tag Patch Version
    runs-on: ubuntu-latest
    needs: test-hotfix
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          LATEST=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" \
                   | grep -v 'alpha\|beta' | sort -V | tail -1)
          echo "Latest stable tag: $LATEST"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "New patch tag: $NEW_TAG"

      - name: Create and push patch tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.bump.outputs.new_tag }}" \
            -m "hotfix: ${{ steps.bump.outputs.new_tag }}"
          git push origin "${{ steps.bump.outputs.new_tag }}"
