version: "3.9"

# ─────────────────────────────────────────────
#  ERP Africa — Environnement de production
#  Usage : docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────

services:

  app:
    image: ${DOCKER_REGISTRY}/erp-backend:${APP_VERSION:-latest}
    container_name: erp_app
    restart: always
    working_dir: /var/www
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    env_file:
      - .env.production
    networks:
      - erp_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M
      restart_policy:
        condition: on-failure
        max_attempts: 3

  queue:
    image: ${DOCKER_REGISTRY}/erp-backend:${APP_VERSION:-latest}
    container_name: erp_queue
    restart: always
    command: php artisan horizon
    env_file:
      - .env.production
    networks:
      - erp_network
    depends_on:
      - app

  scheduler:
    image: ${DOCKER_REGISTRY}/erp-backend:${APP_VERSION:-latest}
    container_name: erp_scheduler
    restart: always
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    env_file:
      - .env.production
    networks:
      - erp_network

  nginx:
    image: ${DOCKER_REGISTRY}/erp-frontend:${APP_VERSION:-latest}
    container_name: erp_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - erp_network
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    restart: always
    environment:
      POSTGRES_DB:       ${DB_DATABASE}
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network

  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  erp_network:
    driver: bridge
