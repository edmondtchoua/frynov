version: "3.9"

# ─────────────────────────────────────────────
#  ERP Africa — Environnement de développement
# ─────────────────────────────────────────────

services:

  # ── Backend Laravel ──────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: erp_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - /var/www/vendor          # vendor reste dans le conteneur
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    env_file:
      - ./backend/.env
    networks:
      - erp_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Queue Worker ─────────────────────────────────────────────
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: erp_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    env_file:
      - ./backend/.env
    networks:
      - erp_network
    depends_on:
      - app
      - redis

  # ── Scheduler ────────────────────────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: erp_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    env_file:
      - ./backend/.env
    networks:
      - erp_network
    depends_on:
      - app

  # ── Frontend Vue 3 ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: erp_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api
      - VITE_APP_ENV=development
    networks:
      - erp_network

  # ── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: erp_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend/public:/var/www/public:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - erp_network
    depends_on:
      - app

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       erp_development
      POSTGRES_USER:     erp
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_development"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network

  # ── Mailpit (emails de dev) ───────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: erp_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Interface web
    networks:
      - erp_network

  # ── MinIO (S3 local) ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: erp_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     erp_admin
      MINIO_ROOT_PASSWORD: erp_secret_123
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    networks:
      - erp_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  erp_network:
    driver: bridge
