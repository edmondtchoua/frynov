# /etc/nginx/sites-available/frynov
# Symlink : ln -s /etc/nginx/sites-available/frynov /etc/nginx/sites-enabled/frynov

server {
    listen 80;
    server_name app.frynov.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.frynov.com;

    # ── SSL (certbot / Let's Encrypt) ─────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/app.frynov.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.frynov.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ── Racine — SPA Vue 3 ────────────────────────────────────────────────────
    root /var/www/frynov/public;
    index index.html;

    # ── Frontend SPA (toutes routes → index.html) ─────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Laravel (/api/* et /sanctum/*) ───────────────────────────────────
    location ~ ^/(api|sanctum)/ {
        root /var/www/frynov/backend/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            include        snippets/fastcgi-php.conf;
            fastcgi_pass   unix:/var/run/php/php8.3-fpm.sock;
            fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include        fastcgi_params;
        }
    }

    # ── Storage (preuves de paiement, uploads) ─────────────────────────────────
    location /storage/ {
        root /var/www/frynov/backend/public;
    }

    # ── Assets Vite (cache long) ──────────────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Sécurité ─────────────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"     always;
    add_header X-Content-Type-Options   "nosniff"        always;
    add_header Referrer-Policy          "strict-origin"  always;
    add_header X-XSS-Protection         "1; mode=block"  always;

    # Masquer la version Nginx
    server_tokens off;

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/frynov_access.log;
    error_log   /var/log/nginx/frynov_error.log;

    # Taille max upload (preuves de paiement : 5 Mo)
    client_max_body_size 6M;
}
