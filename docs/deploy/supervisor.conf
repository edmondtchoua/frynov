; /etc/supervisor/conf.d/frynov.conf
; Après modification : supervisorctl reread && supervisorctl update

[program:frynov-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/frynov/backend/artisan queue:work database --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/supervisor/frynov-worker.log
stopwaitsecs=3600
